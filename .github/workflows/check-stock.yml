name: Check Gunpla Restock

on:
  schedule:
    # GitHub Actions の cron は混雑時に大幅に間引かれる（10分指定→実測2時間に1回）。
    # 起動機会を増やすため複数の時刻を明示し、各起動でジョブ内ループ（下記 LOOP_COUNT）で
    # 約9分間粘ることで、1起動あたりの監視カバー時間を広げる。
    - cron: '0,15,30,45 * * * *'
  workflow_dispatch: # 手動実行も可
    inputs:
      test_notify:
        description: '1にするとテスト通知を1本送って通知経路(Secrets)を確認'
        required: false
        default: '0'

concurrency:
  group: gunpla-restock
  cancel-in-progress: false

jobs:
  check-stock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore stock state
        uses: actions/cache/restore@v4
        with:
          path: stock_state.json
          # v2: page_update のハッシュ計算を変更(揮発日付フィルタ追加)したため
          # 旧ハッシュのcacheを引き継がない。これで新フィルタの基準から開始し誤発火を防ぐ。
          key: gunpla-stock-state-v4-${{ github.run_id }}
          restore-keys: |
            gunpla-stock-state-v4-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock checker
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          # 手動実行時に test_notify=1 を渡すと通知経路テストモードになる
          TEST_NOTIFY: ${{ github.event.inputs.test_notify }}
          # ジョブ内ループ: 3分おきに4回チェック=約9分粘る（間引き対策）
          LOOP_COUNT: '4'
          LOOP_INTERVAL: '180'
        run: python check_stock.py

      - name: Save stock state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: stock_state.json
          key: gunpla-stock-state-v4-${{ github.run_id }}
