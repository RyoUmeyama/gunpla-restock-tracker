name: Check Gunpla Restock

on:
  schedule:
    # 【2026-07-03 クラウド主戦化】ローカルMacは平日日中しか起動しないため、Actionsを主戦に戻す。
    # 制約と対策:
    #  1) privateリポの無料枠は月2,000分。旧設定(1回28分×10回/日)は月初8日で枠切れになり
    #     残り3週間全停止していた（6/30の連続failureの原因）。
    #     → 毎時1回×1パス（サーキットブレーカー導入後は1回2〜3分）＝月約1,500〜1,900分で枠内。
    #  2) nyuka-nowはクラウドIPを遮断 → 主要銘柄はanime-matsuriの同種まとめページに移行済み。
    #     nyuka-now系はローカル実行時のみ機能するボーナス層。
    #  3) cron間引きで指定どおり起動しないことはあり得る前提で運用（:00台の混雑を避けたオフセット）。
    # 【2026-07-03 public化】Actions分数が無制限になったため15分間隔×3パスに引き上げ。
    # 1起動で約15分カバーするので、間引きで1本飛んでも隙間ができにくい。
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch: # 手動実行も可
    inputs:
      test_notify:
        description: '1にするとテスト通知を1本送って通知経路(Secrets)を確認'
        required: false
        default: '0'

concurrency:
  group: gunpla-restock
  cancel-in-progress: false

jobs:
  check-stock:
    runs-on: ubuntu-latest
    timeout-minutes: 90  # ジョブ内ループ(約60分)＋余裕。暴走時の保護
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore stock state
        uses: actions/cache/restore@v4
        with:
          path: stock_state.json
          # page_update のハッシュ計算を変えたらこのキーのバージョンを上げる(v4→v5...)。
          # 旧ハッシュのcacheを引き継がないことで、新フィルタの基準から開始し誤発火を防ぐ。
          key: gunpla-stock-state-v4-${{ github.run_id }}
          restore-keys: |
            gunpla-stock-state-v4-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock checker
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          # 楽天市場API（未設定なら楽天ブックス監視は自動スキップ）
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
          # ntfy.sh スマホプッシュ（未設定ならスキップ。アプリで同名topicを購読する）
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          # 手動実行時に test_notify=1 を渡すと通知経路テストモードになる
          TEST_NOTIFY: ${{ github.event.inputs.test_notify }}
          # 【2026-07-06 カバレッジ拡大】cronは15分指定でも実測60〜90分間隔（深夜は最大4.5時間）
          # に間引かれると週末の実測で判明。1起動を約60分粘る設計にして間引きの隙間を埋める:
          # 8パス×7分間隔≈1時間。concurrencyグループで同時実行は防がれ、待機中のcronが
          # 前ジョブ終了直後に連結して起動する＝ほぼ連続カバー。
          # 監視先への負荷は1ページあたり7〜8分に1回（一般的な在庫監視サービスと同等）。
          LOOP_COUNT: '8'
          LOOP_INTERVAL: '420'
          # ログをリアルタイムに出す（バッファリングで実行途中の進捗が見えない問題の解消）
          PYTHONUNBUFFERED: '1'
        run: python check_stock.py

      - name: Save stock state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: stock_state.json
          key: gunpla-stock-state-v4-${{ github.run_id }}
