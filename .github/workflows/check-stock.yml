name: Check Gunpla Restock

on:
  schedule:
    # 【2026-07-02 方針変更】主戦はローカルMacの launchd（10分おき・local/ 参照）。
    # Actions はMac停止時の保険に格下げ。理由:
    #  1) cron間引きで15分指定でも実測2〜4時間に1回しか起動しない
    #  2) nyuka-now がクラウドIPを遮断しており Actions からは監視の半分が死んでいる
    #  3) private リポジトリの無料枠は月2,000分。旧設定(1回28分×10回/日)は月初8日で
    #     枠切れになり残り3週間全停止していた（6/30の連続failureの原因）。
    # 3時間おき×2パス（1回8分弱）なら月内フル稼働できる。:13 は混雑する :00 を避けるため。
    - cron: '13 */3 * * *'
  workflow_dispatch: # 手動実行も可
    inputs:
      test_notify:
        description: '1にするとテスト通知を1本送って通知経路(Secrets)を確認'
        required: false
        default: '0'

concurrency:
  group: gunpla-restock
  cancel-in-progress: false

jobs:
  check-stock:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # 暴走時の課金枠保護
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore stock state
        uses: actions/cache/restore@v4
        with:
          path: stock_state.json
          # page_update のハッシュ計算を変えたらこのキーのバージョンを上げる(v4→v5...)。
          # 旧ハッシュのcacheを引き継がないことで、新フィルタの基準から開始し誤発火を防ぐ。
          key: gunpla-stock-state-v4-${{ github.run_id }}
          restore-keys: |
            gunpla-stock-state-v4-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock checker
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          # 手動実行時に test_notify=1 を渡すと通知経路テストモードになる
          TEST_NOTIFY: ${{ github.event.inputs.test_notify }}
          # ジョブ内ループ: 3分おきに2回チェック（保険運用。主戦はローカルlaunchd）
          LOOP_COUNT: '2'
          LOOP_INTERVAL: '180'
          # ログをリアルタイムに出す（バッファリングで実行途中の進捗が見えない問題の解消）
          PYTHONUNBUFFERED: '1'
        run: python check_stock.py

      - name: Save stock state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: stock_state.json
          key: gunpla-stock-state-v4-${{ github.run_id }}
